global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

secrets:
  existingSecret: limes-axis-runtime
  createExample: false
  exampleData:
    AXIS_POSTGRES_DSN: REPLACE_WITH_EXTERNAL_SECRET_MANAGER_VALUE
    AXIS_EXTERNAL_DB_LIVE_QUERY_DSN: REPLACE_WITH_EXTERNAL_SECRET_MANAGER_VALUE
    AXIS_TYPEDB_USERNAME: REPLACE_WITH_EXTERNAL_SECRET_MANAGER_VALUE
    AXIS_TYPEDB_PASSWORD: REPLACE_WITH_EXTERNAL_SECRET_MANAGER_VALUE
    AXIS_AUDIT_LEDGER_SIGNING_SECRET: REPLACE_WITH_EXTERNAL_SECRET_MANAGER_VALUE
    AXIS_OIDC_CLIENT_SECRET: REPLACE_WITH_EXTERNAL_SECRET_MANAGER_VALUE
    AXIS_OIDC_SESSION_COOKIE_SIGNING_SECRET: REPLACE_WITH_EXTERNAL_SECRET_MANAGER_VALUE
    AXIS_CONNECTOR_EXPORT_S3_ACCESS_KEY: REPLACE_WITH_EXTERNAL_SECRET_MANAGER_VALUE
    AXIS_CONNECTOR_EXPORT_S3_SECRET_KEY: REPLACE_WITH_EXTERNAL_SECRET_MANAGER_VALUE
  externalSecret:
    enabled: false
    refreshPolicy: Periodic
    refreshInterval: 1h
    secretStoreRef:
      name: limes-axis-secrets
      kind: ClusterSecretStore
    target:
      creationPolicy: Owner
      deletionPolicy: Retain
    data:
      AXIS_POSTGRES_DSN:
        remoteKey: limes-axis/production/postgres
        property: dsn
      AXIS_EXTERNAL_DB_LIVE_QUERY_DSN:
        remoteKey: limes-axis/production/external-db-live-query
        property: dsn
      AXIS_TYPEDB_USERNAME:
        remoteKey: limes-axis/production/typedb
        property: username
      AXIS_TYPEDB_PASSWORD:
        remoteKey: limes-axis/production/typedb
        property: password
      AXIS_AUDIT_LEDGER_SIGNING_SECRET:
        remoteKey: limes-axis/production/audit-ledger
        property: signing-secret
      AXIS_OIDC_CLIENT_SECRET:
        remoteKey: limes-axis/production/oidc
        property: client-secret
      AXIS_OIDC_SESSION_COOKIE_SIGNING_SECRET:
        remoteKey: limes-axis/production/oidc
        property: session-cookie-signing-secret
      AXIS_CONNECTOR_EXPORT_S3_ACCESS_KEY:
        remoteKey: limes-axis/production/object-store
        property: access-key
      AXIS_CONNECTOR_EXPORT_S3_SECRET_KEY:
        remoteKey: limes-axis/production/object-store
        property: secret-key

api:
  replicaCount: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  terminationGracePeriodSeconds: 30
  lifecycle: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: false
    minAvailable: 1
  image:
    repository: ghcr.io/limes-labs/limes-axis-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  env:
    AXIS_ENV: production
    AXIS_PUBLIC_BASE_URL: https://axis.example.com
    AXIS_API_BASE_URL: https://api.axis.example.com
    AXIS_CORS_ORIGINS:
      - https://axis.example.com
    AXIS_API_RATE_LIMIT_ENABLED: "true"
    AXIS_API_RATE_LIMIT_REQUESTS: "120"
    AXIS_API_RATE_LIMIT_WINDOW_SECONDS: "60"
    AXIS_API_RATE_LIMIT_PATHS:
      - /identity/oidc/authorize
      - /identity/oidc/callback
      - /identity/oidc/logout
      - /identity/session/logout
      - /deployment/readiness
      - /support/diagnostics
    AXIS_TYPEDB_ADDRESS: typedb.axis.svc.cluster.local:1729
    AXIS_TYPEDB_DATABASE: axis
    AXIS_TEMPORAL_ADDRESS: temporal-frontend.axis.svc.cluster.local:7233
    AXIS_TEMPORAL_NAMESPACE: default
    AXIS_TEMPORAL_SIGNAL_TIMEOUT_SECONDS: "2.0"
    AXIS_WORKFLOW_SIGNALS_ENABLED: "true"
    AXIS_OIDC_ISSUER: https://keycloak.example.com/realms/axis
    AXIS_OIDC_AUDIENCE: limes-axis-api
    AXIS_OIDC_JWKS_URL: https://keycloak.example.com/realms/axis/protocol/openid-connect/certs
    AXIS_OIDC_ALGORITHMS:
      - RS256
    AXIS_OIDC_ACTOR_CLAIM: sub
    AXIS_OIDC_TENANT_CLAIM: axis_tenant
    AXIS_OIDC_JWKS_CACHE_SECONDS: "300"
    AXIS_OIDC_AUTH_REQUIRED: "true"
    AXIS_OIDC_CLIENT_ID: limes-axis-web
    AXIS_OIDC_AUTHORIZATION_URL: https://keycloak.example.com/realms/axis/protocol/openid-connect/auth
    AXIS_OIDC_TOKEN_URL: https://keycloak.example.com/realms/axis/protocol/openid-connect/token
    AXIS_OIDC_REDIRECT_URI: https://api.axis.example.com/identity/oidc/callback
    AXIS_OIDC_END_SESSION_URL: https://keycloak.example.com/realms/axis/protocol/openid-connect/logout
    AXIS_OIDC_POST_LOGOUT_REDIRECT_URI: https://axis.example.com/signed-out
    AXIS_OIDC_SCOPES:
      - openid
      - profile
      - email
    AXIS_OIDC_LOGIN_COOKIE_NAME: axis_oidc_login
    AXIS_OIDC_SESSION_COOKIE_NAME: axis_session
    AXIS_OIDC_LOGIN_STATE_TTL_SECONDS: "600"
    AXIS_OIDC_SESSION_COOKIE_TTL_SECONDS: "3600"
    AXIS_OIDC_SESSION_COOKIE_SECURE: "true"
    AXIS_ONTOLOGY_MUTATIONS_ENABLED: "false"
    AXIS_ONTOLOGY_QUERIES_ENABLED: "false"
    AXIS_EXTERNAL_MODEL_EGRESS_ENABLED: "false"
    # Supported deployment tenancy modes:
    # - saas_multi_tenant
    # - single_tenant_managed
    # - private_cloud
    # - on_prem
    AXIS_DEPLOYMENT_TENANCY_MODE: saas_multi_tenant
    AXIS_DEPLOYMENT_CUSTOMER_ISOLATION_CONFIGURED: "false"
    AXIS_DEPLOYMENT_DATA_RESIDENCY_CONFIGURED: "false"
    AXIS_DEPLOYMENT_OPERATOR_ACCESS_RUNBOOK_CONFIGURED: "false"
    AXIS_DEPLOYMENT_BREAK_GLASS_APPROVAL_CONFIGURED: "false"
    AXIS_CREDENTIAL_LEASE_EXECUTION_ENABLED: "false"
    AXIS_CREDENTIAL_LEASE_PROVIDER_ADAPTERS_ENABLED: "false"
    AXIS_CONNECTOR_SYNC_EXECUTION_ENABLED: "false"
    AXIS_EXTERNAL_DB_SYNC_EXECUTION_ENABLED: "false"
    AXIS_EXTERNAL_DB_LIVE_QUERY_PREFLIGHT_ENABLED: "false"
    AXIS_EXTERNAL_DB_LIVE_QUERY_EXECUTION_ENABLED: "false"
    AXIS_EXTERNAL_DB_LIVE_QUERY_PROFILE_ID: profile_postgres_ops_readonly
    AXIS_EXTERNAL_DB_LIVE_QUERY_SCHEMA: operations
    AXIS_EXTERNAL_DB_LIVE_QUERY_TABLE: production_orders
    AXIS_EXTERNAL_DB_LIVE_QUERY_COLUMNS:
      - order_id
      - asset_id
      - work_center
      - status
      - risk_level
    AXIS_EXTERNAL_DB_LIVE_QUERY_ROW_LIMIT: "100"
    AXIS_EXTERNAL_DB_LIVE_QUERY_PRIVATE_ENDPOINT_REF: private-endpoint://tenant_demo_manufacturing/persisted-operations-postgres-readonly
    AXIS_AUDIT_LEDGER_SIGNING_KEY_ID: axis-self-hosted-audit-ledger
    AXIS_CONNECTOR_EXPORT_OBJECT_STORE_ROOT: s3://limes-axis-evidence
    AXIS_CONNECTOR_EXPORT_OBJECT_STORE_ADAPTER: s3_compatible
    AXIS_CONNECTOR_EXPORT_S3_ENDPOINT: minio.axis.svc.cluster.local:9000
    AXIS_CONNECTOR_EXPORT_S3_REGION: eu-central-1
    AXIS_CONNECTOR_EXPORT_S3_BUCKET: limes-axis-evidence
    AXIS_CONNECTOR_EXPORT_S3_SECURE_TRANSPORT: "true"
    AXIS_CONNECTOR_EXPORT_S3_OBJECT_LOCK_ENABLED: "false"
    AXIS_CONNECTOR_EXPORT_S3_RETENTION_MODE: GOVERNANCE
    AXIS_CONNECTOR_EXPORT_S3_RETENTION_DAYS: "0"
    AXIS_CONNECTOR_EXPORT_S3_LEGAL_HOLD_ENABLED: "false"
    AXIS_DR_RUNBOOK_CONFIGURED: "false"
    AXIS_DR_RPO_RTO_DEFINED: "false"
    AXIS_DR_REHEARSAL_EVIDENCE_CONFIGURED: "false"
    AXIS_DR_RESTORE_OWNER_CONFIGURED: "false"
    AXIS_DR_CUSTOMER_APPROVAL_CONFIGURED: "false"
    AXIS_SUPPORT_MODEL_ENABLED: "false"
    AXIS_SUPPORT_COVERAGE: demo_business_hours
    AXIS_SUPPORT_S1_RESPONSE_MINUTES: "0"
    AXIS_SUPPORT_S2_RESPONSE_MINUTES: "0"
    AXIS_SUPPORT_S3_RESPONSE_MINUTES: "0"
    AXIS_SUPPORT_S4_RESPONSE_MINUTES: "0"
    AXIS_SUPPORT_ESCALATION_CHANNELS: []
    AXIS_SUPPORT_CUSTOMER_RUNBOOK_URL: ""
    AXIS_SUPPORT_STATUS_PAGE_URL: ""
    AXIS_SUPPORT_INCIDENT_REVIEW_REQUIRED: "false"
    AXIS_SUPPORT_SIGNED_COMMITMENT_CONFIGURED: "false"
    AXIS_SUPPORT_NAMED_STAFFING_MODEL_CONFIGURED: "false"
    AXIS_SUPPORT_CUSTOMER_INCIDENT_OPERATIONS_CONFIGURED: "false"
    AXIS_SUPPORT_LEGAL_SLA_TERMS_CONFIGURED: "false"
  podAnnotations: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
  podSecurityContext:
    fsGroup: 10001
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

web:
  replicaCount: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  terminationGracePeriodSeconds: 30
  lifecycle: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: false
    minAvailable: 1
  image:
    repository: ghcr.io/limes-labs/limes-axis-web
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  env:
    NEXT_PUBLIC_AXIS_API_BASE_URL: https://api.axis.example.com
  podAnnotations: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 750m
      memory: 768Mi
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
  podSecurityContext:
    fsGroup: 10001
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

observability:
  # OpenTelemetry distributed tracing + metrics for the API and worker. Off by
  # default so existing deployments are unaffected. Enable and point the OTLP
  # exporter at a collector (otel-collector, Grafana Alloy, Jaeger, or Tempo) to
  # emit traces and metrics. See docs/platform-observability.md.
  otel:
    enabled: false
    # OTLP/HTTP base endpoint; /v1/traces and /v1/metrics are appended per signal.
    exporterOtlpEndpoint: "http://otel-collector:4318"
    metricsEnabled: true

worker:
  # The Temporal worker hosts the approval workflow plus the scheduled
  # maintenance workflows and their DB-owning activities.
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  terminationGracePeriodSeconds: 30
  image:
    repository: ghcr.io/limes-labs/limes-axis-worker
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  # Scheduled maintenance jobs are opt-in. The worker always reconciles the
  # Temporal Schedules on startup; when enabled is false they are registered but
  # paused, so existing deployments are unaffected until explicitly enabled.
  scheduledJobs:
    enabled: false
    auditRetentionIntervalSeconds: 86400
    auditRetentionDays: 365
    auditRetentionDryRun: true
    auditRetentionBatchLimit: 500
    sessionSweepIntervalSeconds: 900
    sessionSweepBatchLimit: 500
    tenantReconciliationIntervalSeconds: 3600
  podAnnotations: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
  podSecurityContext:
    fsGroup: 10001
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

tests:
  smoke:
    enabled: true
    image:
      repository: busybox
      tag: "1.36.1"
      pullPolicy: IfNotPresent
    activeDeadlineSeconds: 120
    retryAttempts: 12
    requestTimeoutSeconds: 5
    podAnnotations: {}
    podLabels: {}
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65534
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

ingress:
  enabled: false
  className: ""
  annotations: {}
  certManager:
    enabled: false
    issuerName: ""
    issuerKind: ClusterIssuer
    issuerGroup: cert-manager.io
  hosts:
    - host: axis.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
    - host: api.axis.example.com
      paths:
        - path: /
          pathType: Prefix
          service: api
  tls: []

networkPolicy:
  enabled: true
  dnsPort: 53
  egressMode: port_allowlist
  allowedEgressPorts:
    - 443
    - 5432
    - 1729
    - 7233
    - 9000
  allowedEgressCidrs: []

externalServices:
  postgres:
    mode: external
    description: Use an external Postgres instance with AXIS_POSTGRES_DSN supplied by secrets.existingSecret.
  typedb:
    mode: external
    addressEnv: AXIS_TYPEDB_ADDRESS
  temporal:
    mode: external
    addressEnv: AXIS_TEMPORAL_ADDRESS
  objectStore:
    mode: s3-compatible
    rootEnv: AXIS_CONNECTOR_EXPORT_OBJECT_STORE_ROOT
    adapterEnv: AXIS_CONNECTOR_EXPORT_OBJECT_STORE_ADAPTER
    endpointEnv: AXIS_CONNECTOR_EXPORT_S3_ENDPOINT
    bucketEnv: AXIS_CONNECTOR_EXPORT_S3_BUCKET
    wormRetention: explicit-readiness-gate
  oidc:
    mode: external
    issuerEnv: AXIS_OIDC_ISSUER
