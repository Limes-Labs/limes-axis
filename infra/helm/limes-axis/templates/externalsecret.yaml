{{- if .Values.secrets.externalSecret.enabled -}}
{{- if not .Values.secrets.externalSecret.data -}}
{{- fail "secrets.externalSecret.data must not be empty when secrets.externalSecret.enabled=true" -}}
{{- end -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "limes-axis.fullname" . }}-runtime
  labels:
    {{- include "limes-axis.labels" . | nindent 4 }}
  annotations:
    limes-axis.io/target-secret: {{ .Values.secrets.existingSecret | quote }}
spec:
  refreshPolicy: {{ .Values.secrets.externalSecret.refreshPolicy | quote }}
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "secrets.externalSecret.secretStoreRef.name is required" .Values.secrets.externalSecret.secretStoreRef.name | quote }}
    kind: {{ default "ClusterSecretStore" .Values.secrets.externalSecret.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.secrets.existingSecret | quote }}
    creationPolicy: {{ .Values.secrets.externalSecret.target.creationPolicy | quote }}
    deletionPolicy: {{ .Values.secrets.externalSecret.target.deletionPolicy | quote }}
  data:
{{- range $secretKey, $remote := .Values.secrets.externalSecret.data }}
    - secretKey: {{ $secretKey | quote }}
      remoteRef:
        key: {{ required (printf "secrets.externalSecret.data.%s.remoteKey is required" $secretKey) $remote.remoteKey | quote }}{{ with $remote.property }}
        property: {{ . | quote }}{{ end }}{{ with $remote.version }}
        version: {{ . | quote }}{{ end }}
{{- end }}
{{- end }}
