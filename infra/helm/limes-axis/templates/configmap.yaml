  AXIS_OIDC_ACTOR_CLAIM: {{ .Values.api.env.AXIS_OIDC_ACTOR_CLAIM | quote }}
  AXIS_OIDC_TENANT_CLAIM: {{ .Values.api.env.AXIS_OIDC_TENANT_CLAIM | quote }}
  AXIS_OIDC_JWKS_CACHE_SECONDS: {{ .Values.api.env.AXIS_OIDC_JWKS_CACHE_SECONDS | quote }}
  AXIS_OIDC_AUTH_REQUIRED: {{ .Values.api.env.AXIS_OIDC_AUTH_REQUIRED | quote }}
  AXIS_ONTOLOGY_MUTATIONS_ENABLED: {{ .Values.api.env.AXIS_ONTOLOGY_MUTATIONS_ENABLED | quote }}
  AXIS_ONTOLOGY_QUERIES_ENABLED: {{ .Values.api.env.AXIS_ONTOLOGY_QUERIES_ENABLED | quote }}
