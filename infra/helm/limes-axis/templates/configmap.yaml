apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "limes-axis.fullname" . }}-config
  labels:
    {{- include "limes-axis.labels" . | nindent 4 }}
data:
  AXIS_ENV: {{ .Values.api.env.AXIS_ENV | quote }}
  AXIS_PUBLIC_BASE_URL: {{ .Values.api.env.AXIS_PUBLIC_BASE_URL | quote }}
  AXIS_API_BASE_URL: {{ .Values.api.env.AXIS_API_BASE_URL | quote }}
  AXIS_CORS_ORIGINS: {{ .Values.api.env.AXIS_CORS_ORIGINS | toJson | quote }}
  AXIS_TYPEDB_ADDRESS: {{ .Values.api.env.AXIS_TYPEDB_ADDRESS | quote }}
  AXIS_TYPEDB_DATABASE: {{ .Values.api.env.AXIS_TYPEDB_DATABASE | quote }}
  AXIS_TEMPORAL_ADDRESS: {{ .Values.api.env.AXIS_TEMPORAL_ADDRESS | quote }}
  AXIS_TEMPORAL_NAMESPACE: {{ .Values.api.env.AXIS_TEMPORAL_NAMESPACE | quote }}
  AXIS_TEMPORAL_SIGNAL_TIMEOUT_SECONDS: {{ .Values.api.env.AXIS_TEMPORAL_SIGNAL_TIMEOUT_SECONDS | quote }}
  AXIS_WORKFLOW_SIGNALS_ENABLED: {{ .Values.api.env.AXIS_WORKFLOW_SIGNALS_ENABLED | quote }}
  AXIS_OIDC_ISSUER: {{ .Values.api.env.AXIS_OIDC_ISSUER | quote }}
  AXIS_OIDC_AUDIENCE: {{ .Values.api.env.AXIS_OIDC_AUDIENCE | quote }}
