  AXIS_CONNECTOR_SYNC_EXECUTION_ENABLED: {{ .Values.api.env.AXIS_CONNECTOR_SYNC_EXECUTION_ENABLED | quote }}
  AXIS_EXTERNAL_DB_SYNC_EXECUTION_ENABLED: {{ .Values.api.env.AXIS_EXTERNAL_DB_SYNC_EXECUTION_ENABLED | quote }}
  AXIS_EXTERNAL_DB_LIVE_QUERY_PREFLIGHT_ENABLED: {{ .Values.api.env.AXIS_EXTERNAL_DB_LIVE_QUERY_PREFLIGHT_ENABLED | quote }}
  AXIS_AUDIT_LEDGER_SIGNING_KEY_ID: {{ .Values.api.env.AXIS_AUDIT_LEDGER_SIGNING_KEY_ID | quote }}
  AXIS_CONNECTOR_EXPORT_OBJECT_STORE_ROOT: {{ .Values.api.env.AXIS_CONNECTOR_EXPORT_OBJECT_STORE_ROOT | quote }}
  AXIS_CONNECTOR_EXPORT_OBJECT_STORE_ADAPTER: {{ .Values.api.env.AXIS_CONNECTOR_EXPORT_OBJECT_STORE_ADAPTER | quote }}
