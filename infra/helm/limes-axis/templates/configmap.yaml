  AXIS_CONNECTOR_EXPORT_S3_SECURE_TRANSPORT: {{ .Values.api.env.AXIS_CONNECTOR_EXPORT_S3_SECURE_TRANSPORT | quote }}
  AXIS_CONNECTOR_EXPORT_S3_OBJECT_LOCK_ENABLED: {{ .Values.api.env.AXIS_CONNECTOR_EXPORT_S3_OBJECT_LOCK_ENABLED | quote }}
  AXIS_CONNECTOR_EXPORT_S3_RETENTION_MODE: {{ .Values.api.env.AXIS_CONNECTOR_EXPORT_S3_RETENTION_MODE | quote }}
  AXIS_CONNECTOR_EXPORT_S3_RETENTION_DAYS: {{ .Values.api.env.AXIS_CONNECTOR_EXPORT_S3_RETENTION_DAYS | quote }}
  AXIS_CONNECTOR_EXPORT_S3_LEGAL_HOLD_ENABLED: {{ .Values.api.env.AXIS_CONNECTOR_EXPORT_S3_LEGAL_HOLD_ENABLED | quote }}
