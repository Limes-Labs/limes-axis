{{- if .Values.api.pdb.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "limes-axis.fullname" . }}-api
  labels:
    {{- include "limes-axis.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: {{ .Values.api.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "limes-axis.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
{{- if and .Values.api.pdb.enabled .Values.web.pdb.enabled }}
---
{{- end }}
{{- if .Values.web.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "limes-axis.fullname" . }}-web
  labels:
    {{- include "limes-axis.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  minAvailable: {{ .Values.web.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "limes-axis.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
{{- end }}
