{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "limes-axis.fullname" . }}
  labels:
    {{- include "limes-axis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "limes-axis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.api.service.port }}
        - protocol: TCP
          port: {{ .Values.web.service.port }}
  egress:
    - ports:
        - protocol: UDP
          port: {{ .Values.networkPolicy.dnsPort }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.dnsPort }}
    - ports:
        {{- range .Values.networkPolicy.allowedEgressPorts }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- if .Values.tests.smoke.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "limes-axis.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.api.service.port }}
        - protocol: TCP
          port: {{ .Values.web.service.port }}
    {{- end }}
{{- end }}
