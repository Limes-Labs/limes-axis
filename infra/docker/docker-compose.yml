services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: axis
      POSTGRES_PASSWORD: axis
      POSTGRES_DB: axis
    ports:
      - "5432:5432"
    volumes:
      - axis-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axis -d axis"]
      interval: 5s
      timeout: 5s
      retries: 20

  typedb:
    image: typedb/typedb@sha256:b51d9131b6b4c4dd102c377b9b8941a81a90e2f982af9a0b58f1ba5e0bfcf9b7
    ports:
      - "1729:1729"
      - "8001:8000"
    volumes:
      - axis-typedb:/var/lib/typedb/data
    # Liveness probe: the gRPC server listens on 1729. A TCP connect is a
    # driver-agnostic readiness signal; the axis meta-ontology schema is loaded
    # separately via `python -m axis_api.ontology.bootstrap` (see
    # type-db-init/README.md).
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/1729'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  temporal:
    image: temporalio/auto-setup:1.25
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: axis
      POSTGRES_PWD: axis
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: axis
      MINIO_ROOT_PASSWORD: axis-axis
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - axis-minio:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: axis
      KEYCLOAK_ADMIN_PASSWORD: axis-axis
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/axis-realm.json:/opt/keycloak/data/import/axis-realm.json:ro

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    environment:
      AXIS_ENV: development
      AXIS_POSTGRES_DSN: postgresql+psycopg://axis:axis@postgres:5432/axis
      AXIS_TEMPORAL_ADDRESS: temporal:7233
      AXIS_TEMPORAL_NAMESPACE: default
      # Scheduled maintenance jobs are opt-in. The worker always reconciles the
      # Temporal Schedules on startup, but leaves them paused unless this is true.
      AXIS_SCHEDULED_JOBS_ENABLED: "false"
      # OpenTelemetry tracing/metrics are off by default. To emit traces, set
      # AXIS_OTEL_ENABLED=true and uncomment the otel-collector service below;
      # the OTLP/HTTP exporter posts to :4318 (/v1/traces and /v1/metrics).
      AXIS_OTEL_ENABLED: "false"
      AXIS_OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      AXIS_OTEL_METRICS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

  # Optional OpenTelemetry collector. Uncomment (and set AXIS_OTEL_ENABLED=true on
  # the API/worker) to receive OTLP traces/metrics and fan them out to a backend
  # such as Jaeger, Tempo, or Grafana. Kept commented so the default demo stack
  # stays lean and no collector image is pulled unless observability is wanted.
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:0.116.0
  #   command: ["--config=/etc/otel-collector-config.yaml"]
  #   volumes:
  #     - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
  #   ports:
  #     - "4317:4317"  # OTLP gRPC
  #     - "4318:4318"  # OTLP HTTP

volumes:
  axis-postgres:
  axis-typedb:
  axis-minio:
