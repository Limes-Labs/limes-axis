services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: axis
      POSTGRES_PASSWORD: axis
      POSTGRES_DB: axis
    ports:
      - "5432:5432"
    volumes:
      - axis-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axis -d axis"]
      interval: 5s
      timeout: 5s
      retries: 20

  typedb:
    image: typedb/typedb@sha256:b51d9131b6b4c4dd102c377b9b8941a81a90e2f982af9a0b58f1ba5e0bfcf9b7
    ports:
      - "1729:1729"
      - "8001:8000"
    volumes:
      - axis-typedb:/var/lib/typedb/data

  temporal:
    image: temporalio/auto-setup:1.25
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: axis
      POSTGRES_PWD: axis
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: axis
      MINIO_ROOT_PASSWORD: axis-axis
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - axis-minio:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: axis
      KEYCLOAK_ADMIN_PASSWORD: axis-axis
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/axis-realm.json:/opt/keycloak/data/import/axis-realm.json:ro

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    environment:
      AXIS_ENV: development
      AXIS_POSTGRES_DSN: postgresql+psycopg://axis:axis@postgres:5432/axis
      AXIS_TEMPORAL_ADDRESS: temporal:7233
      AXIS_TEMPORAL_NAMESPACE: default
      # Scheduled maintenance jobs are opt-in. The worker always reconciles the
      # Temporal Schedules on startup, but leaves them paused unless this is true.
      AXIS_SCHEDULED_JOBS_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

volumes:
  axis-postgres:
  axis-typedb:
  axis-minio:
