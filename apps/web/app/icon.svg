<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    Favicon derived from the AxisMark brand geometry (components/axis-mark.tsx):
    a vertical Signal Blue axis with a centered diamond and three rays
    converging from each side. Strokes are slightly boldened versus the inline
    mark so the icon stays legible at 16px, and the rays use a mid slate that
    reads on both light and dark browser tabs. Background stays transparent.
  -->
  <line x1="24" y1="4" x2="24" y2="44" stroke="#2F64FF" stroke-width="3" stroke-linecap="round" />
  <g stroke="#64748B" stroke-linecap="round">
    <line x1="4.5" y1="24" x2="17.5" y2="24" stroke-width="3.2" />
    <line x1="9" y1="16.5" x2="18" y2="22.2" stroke-width="2.6" />
    <line x1="9" y1="31.5" x2="18" y2="25.8" stroke-width="2.6" />
    <line x1="43.5" y1="24" x2="30.5" y2="24" stroke-width="3.2" />
    <line x1="39" y1="16.5" x2="30" y2="22.2" stroke-width="2.6" />
    <line x1="39" y1="31.5" x2="30" y2="25.8" stroke-width="2.6" />
  </g>
  <rect x="19.5" y="19.5" width="9" height="9" rx="1.4" fill="#2F64FF" transform="rotate(45 24 24)" />
</svg>
