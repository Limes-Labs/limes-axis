name: Bug report
description: Report a reproducible issue in Limes Axis.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Limes Axis. Please avoid sharing secrets,
        personal data, customer data or proprietary internal logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Start local runtime with ...
        2. Open ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Web console
        - Worker/workflows
        - Ontology/TypeDB
        - Docker/runtime
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, Node version, Python version and relevant commands.
  - type: checkboxes
    id: checklist
    attributes:
      label: Safety checklist
      options:
        - label: I have removed secrets, personal data and customer-specific details.
          required: true
