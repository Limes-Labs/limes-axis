name: Container Release

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push images to GHCR and publish attestations
        required: true
        type: boolean
        default: false
      image_tag:
        description: Optional additional image tag for manual releases
        required: false
        type: string
      release_approval_issue:
        description: GitHub issue URL containing release approval evidence
        required: false
        type: string
      rollback_plan_issue:
        description: GitHub issue URL containing rollback plan evidence
        required: false
        type: string
      rollback_drill_id:
        description: Identifier for the latest rollback drill or rehearsal
        required: false
        type: string
      rollback_plan_acknowledged:
        description: Confirm the rollback plan has been reviewed before publishing
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-images:
    name: Build ${{ matrix.component }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            image: ghcr.io/${{ github.repository_owner }}/limes-axis-api
            dockerfile: services/api/Dockerfile
          - component: web
            image: ghcr.io/${{ github.repository_owner }}/limes-axis-web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=git-
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}
          labels: |
            org.opencontainers.image.title=Limes Axis ${{ matrix.component }}
            org.opencontainers.image.description=The sovereign AI control plane for European operations
            org.opencontainers.image.vendor=Limes Labs
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

  validate-promotion-evidence:
    name: Validate promotion evidence
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.push == true }}
    needs: build-images
    runs-on: ubuntu-latest

    steps:
      - name: Validate promotion evidence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_APPROVAL_ISSUE: ${{ inputs.release_approval_issue }}
          ROLLBACK_PLAN_ISSUE: ${{ inputs.rollback_plan_issue }}
          ROLLBACK_DRILL_ID: ${{ inputs.rollback_drill_id }}
          ROLLBACK_PLAN_ACKNOWLEDGED: ${{ inputs.rollback_plan_acknowledged }}
        run: |
          set -euo pipefail
          issue_pattern='^https://github\.com/Limes-Labs/limes-axis/issues/[0-9]+$'
          if [[ ! "${RELEASE_APPROVAL_ISSUE}" =~ ${issue_pattern} ]]; then
            echo "release_approval_issue must be a limes-axis GitHub issue URL" >&2
            exit 1
          fi
          if [[ ! "${ROLLBACK_PLAN_ISSUE}" =~ ${issue_pattern} ]]; then
            echo "rollback_plan_issue must be a limes-axis GitHub issue URL" >&2
            exit 1
          fi
          if [[ -z "${ROLLBACK_DRILL_ID}" ]]; then
            echo "rollback_drill_id is required for publishing" >&2
            exit 1
          fi
          if [[ "${ROLLBACK_PLAN_ACKNOWLEDGED}" != "true" ]]; then
            echo "rollback_plan_acknowledged must be true for publishing" >&2
            exit 1
          fi
          gh issue view "$RELEASE_APPROVAL_ISSUE" --json number,state,title,url >/tmp/release-approval.json
          gh issue view "$ROLLBACK_PLAN_ISSUE" --json number,state,title,url >/tmp/rollback-plan.json

  publish-images:
    name: Publish governed ${{ matrix.component }} image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.push == true }}
    needs: validate-promotion-evidence
    runs-on: ubuntu-latest
    environment:
      name: axis-container-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            image: ghcr.io/${{ github.repository_owner }}/limes-axis-api
            dockerfile: services/api/Dockerfile
          - component: web
            image: ghcr.io/${{ github.repository_owner }}/limes-axis-web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=git-
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}
          labels: |
            org.opencontainers.image.title=Limes Axis ${{ matrix.component }}
            org.opencontainers.image.description=The sovereign AI control plane for European operations
            org.opencontainers.image.vendor=Limes Labs
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'workflow_dispatch' && inputs.push == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image digest
        env:
          IMAGE_DIGEST_REF: ${{ matrix.image }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_DIGEST_REF}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
