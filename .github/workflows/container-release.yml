name: Container Release

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push images to GHCR and publish attestations
        required: true
        type: boolean
        default: false
      image_tag:
        description: Optional additional image tag for manual releases
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  release-images:
    name: Build and release ${{ matrix.component }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            image: ghcr.io/${{ github.repository_owner }}/limes-axis-api
            dockerfile: services/api/Dockerfile
          - component: web
            image: ghcr.io/${{ github.repository_owner }}/limes-axis-web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        if: ${{ github.event_name == 'push' || inputs.push == true }}
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=git-
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}
          labels: |
            org.opencontainers.image.title=Limes Axis ${{ matrix.component }}
            org.opencontainers.image.description=The sovereign AI control plane for European operations
            org.opencontainers.image.vendor=Limes Labs
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        if: ${{ github.event_name == 'push' || inputs.push == true }}
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image digest
        if: ${{ github.event_name == 'push' || inputs.push == true }}
        env:
          IMAGE_DIGEST_REF: ${{ matrix.image }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_DIGEST_REF}"

      - name: Attest build provenance
        if: ${{ github.event_name == 'push' || inputs.push == true }}
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
