name: Container Security

on:
  pull_request:
    paths:
      - ".github/workflows/container-security.yml"
      - ".dockerignore"
      - "services/api/Dockerfile"
      - "apps/web/Dockerfile"
      - "services/api/uv.lock"
      - "apps/web/package.json"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/container-security.yml"
      - ".dockerignore"
      - "services/api/Dockerfile"
      - "apps/web/Dockerfile"
      - "services/api/uv.lock"
      - "apps/web/package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-image-scan:
    name: Trivy ${{ matrix.component }} image scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            dockerfile: services/api/Dockerfile
          - component: web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scan
        run: docker build -f ${{ matrix.dockerfile }} -t limes-axis-${{ matrix.component }}:scan .

      - name: Scan image for critical fixed vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: image
          image-ref: limes-axis-${{ matrix.component }}:scan
          version: v0.71.2
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln
          format: table
          exit-code: "1"
          timeout: 10m
